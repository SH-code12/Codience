# Backend CI/CD
name: Backend CI/CD

on:
  push:
    branches: [ devops ]   # exact branch name
    paths:
      - 'Backend/**'       # only trigger if backend files change

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node (if needed)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install backend dependencies
      - name: Install Dependencies
        run: |
          cd Backend
          npm install

      # 4️⃣ Build backend (if applicable)
      - name: Build Backend
        run: |
          cd Backend
          npm run build

      # 5️⃣ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t codiencebackci ./Backend

      # 6️⃣ Tag Docker image for DockerHub
      - name: Tag Docker Image
        run: |
          docker tag codiencebackci shahdelnassag/codience:backci

      # 7️⃣ Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8️⃣ Push Docker image
      - name: Push Docker Image
        run: |
          docker push shahdelnassag/codience:backci