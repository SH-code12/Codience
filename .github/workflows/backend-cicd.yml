# Backend CI/CD for .NET
name: Backend CI/CD

on:
  push:
    branches: [ DevOps ]   # exact branch name

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0  # adjust if using another version

      # 3️⃣ Restore dependencies
      - name: Restore .NET dependencies
        run: |
          cd Backend
          dotnet restore

      # 4️⃣ Build backend
      - name: Build Backend
        run: |
          cd Backend
          dotnet build --configuration Release

      # 5️⃣ Publish backend (creates self-contained files for Docker)
      - name: Publish Backend
        run: |
          cd Backend
          dotnet publish -c Release -o publish

      # 6️⃣ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t codiencebackci ./Backend

      # 7️⃣ Tag Docker image for DockerHub
      - name: Tag Docker Image
        run: |
          docker tag codiencebackci shahdelnassag/codience:backci

      # 8️⃣ Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 9️⃣ Push Docker image
      - name: Push Docker Image
        run: |
          docker push shahdelnassag/codience:backci